# Static analysis configuration.
# Docs: https://dart.dev/guides/language/analysis-options
include: package:flutter_lints/flutter.yaml

plugins:
  riverpod_lint: ^3.1.4

analyzer:
  exclude:
    # drift_dev migration fixtures intentionally mirror historical generated
    # APIs, including raw TableInfo types in older snapshots.
    - test/generated_schema.dart/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    prefer_single_quotes: true
    unawaited_futures: true
    directives_ordering: true
